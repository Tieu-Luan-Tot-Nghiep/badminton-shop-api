services:
  app:
    container_name: ${CONTAINER_NAME:-badmintion-shop}
    image: ${APP_IMAGE:-badmintion-shop:latest}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SERVER_PORT: ${CONTAINER_PORT:-8080}
      DB_URL: ${DB_URL:-jdbc:postgresql://postgres:5432/badminton_shop}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      # Đường dẫn model CLIP cho DJL Java (khai báo trong .env hoặc trực tiếp ở đây)
      # app.search.clip.model-path=/home/ec2-user/models/clip-vit-base-patch32
      # RABBITMQ_ADDRESSES should be set in .env, e.g. amqp://user:pass@rabbitmq-local:5672
    ports:
      - "${HOST_PORT:-80}:${CONTAINER_PORT:-8080}"
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_started
      rabbitmq-local:
        condition: service_started
      redis-local:
        condition: service_started
      mongodb:
        condition: service_healthy

  postgres:
    container_name: postgres
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-badminton_shop}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-badminton_shop}"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 15s
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  elasticsearch:
    container_name: elasticsearch
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.0
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
    ports:
      - "9200:9200"
      - "9300:9300"

  rabbitmq-local:
    container_name: rabbitmq-local
    image: rabbitmq:3-management
    restart: unless-stopped
    env_file:
      - .env
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "5672:5672"
      - "15672:15672"

  redis-local:
    container_name: redis-local
    image: redis:latest
    restart: unless-stopped
    env_file:
      - .env
    command: ["sh", "-c", "redis-server --requirepass ${REDIS_CONTAINER_PASSWORD}"]
    ports:
      - "6379:6379"

  mongodb:
    container_name: mongodb
    image: mongo:7.0
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-badminton_shop}
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 20s
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27018:27017"

volumes:
  postgres_data:
  mongodb_data: