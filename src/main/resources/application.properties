spring.application.name=BadmintonShop
server.port=80
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.hikari.maximum-pool-size=10
spring.jpa.hibernate.ddl-auto=update

# === Email (Gmail SMTP) ===
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME}
spring.mail.password=${EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# === RabbitMQ (CloudAMQP) ===
spring.rabbitmq.addresses=${RABBITMQ_ADDRESSES}

# === MongoDB (Chat history) ===
spring.data.mongodb.uri=${MONGO_DB_CONNECT_STRING}

# === Redis (Upstash Cloud) ===
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.username=${REDIS_USERNAME}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.ssl.enabled=true
app.cart.redis.ttl-days=${CART_REDIS_TTL_DAYS:7}

# === Auth rate limiting for sensitive endpoints ===
app.auth.rate-limit.forgot-password.cooldown-seconds=${AUTH_FORGOT_PASSWORD_COOLDOWN_SECONDS:60}
app.auth.rate-limit.forgot-password.max-requests=${AUTH_FORGOT_PASSWORD_MAX_REQUESTS:3}
app.auth.rate-limit.forgot-password.window-seconds=${AUTH_FORGOT_PASSWORD_WINDOW_SECONDS:300}
app.auth.rate-limit.resend-verification.cooldown-seconds=${AUTH_RESEND_VERIFICATION_COOLDOWN_SECONDS:60}
app.auth.rate-limit.resend-verification.max-requests=${AUTH_RESEND_VERIFICATION_MAX_REQUESTS:3}
app.auth.rate-limit.resend-verification.window-seconds=${AUTH_RESEND_VERIFICATION_WINDOW_SECONDS:300}

# === Shipping (GHN Staging) ===
app.shipping.ghn.base-url=${GHN_BASE_URL:https://dev-online-gateway.ghn.vn/shiip/public-api}
app.shipping.ghn.token=${GHN_TOKEN:}
app.shipping.ghn.shop-id=${GHN_SHOP_ID:0}
app.shipping.ghn.from-district-id=${GHN_FROM_DISTRICT_ID:0}
app.shipping.ghn.service-type-id=${GHN_SERVICE_TYPE_ID:2}
app.shipping.ghn.default-weight-grams=${GHN_DEFAULT_WEIGHT_GRAMS:1000}
app.shipping.ghn.default-length-cm=${GHN_DEFAULT_LENGTH_CM:35}
app.shipping.ghn.default-width-cm=${GHN_DEFAULT_WIDTH_CM:10}
app.shipping.ghn.default-height-cm=${GHN_DEFAULT_HEIGHT_CM:5}
app.shipping.ghn.callback-auth-token=${GHN_CALLBACK_AUTH_TOKEN:}

# === Social Login (OAuth2) ===
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email

spring.security.oauth2.client.registration.facebook.client-id=${FACEBOOK_CLIENT_ID}
spring.security.oauth2.client.registration.facebook.client-secret=${FACEBOOK_CLIENT_SECRET}
spring.security.oauth2.client.registration.facebook.scope=public_profile,email

# === Payment (VNPay) ===
vnpay.tmn-code=${VNPAY_TMN_CODE}
vnpay.hash-secret=${VNPAY_HASH_SECRET}
vnpay.url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
vnpay.return-url=http://localhost:8080/api/payment/vnpay-callback

# === AWS S3 ===
aws.s3.bucket=${AWS_S3_BUCKET}
spring.cloud.aws.credentials.access-key=${AWS_ACCESS_KEY}
spring.cloud.aws.credentials.secret-key=${AWS_SECRET_KEY}
spring.cloud.aws.region.static=${AWS_REGION}
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# === Elasticsearch Cloud ===
spring.elasticsearch.uris=${ELASTICSEARCH_URIS}
# L?u �: Ch�ng ta d�ng API_KEY n�n kh�ng khai b�o spring.elasticsearch.username/password ? ?�y
app.search.elasticsearch.api-key=${ELASTICSEARCH_API_KEY}
app.search.elasticsearch.index.products=${ELASTICSEARCH_PRODUCTS_INDEX:products}

# === CLIP image embedding provider ===
# Option 1: local exported CLIP model path (directory)
app.search.clip.model-path=${CLIP_MODEL_PATH:}
# Option 2: local CLIP HTTP service URL (expects POST octet-stream -> JSON vector)
app.search.clip.service-url=${CLIP_SERVICE_URL:}

# === Chatbot (Gemini + Chat Memory) ===
app.chatbot.gemini.base-url=${GEMINI_BASE_URL:https://generativelanguage.googleapis.com}
app.chatbot.gemini.model=${GEMINI_MODEL:gemini-2.0-flash}
app.chatbot.history.index=${ELASTICSEARCH_CHAT_HISTORY_INDEX:chat_history}

# Ng?t t? ??ng t?o index ? m?c h? th?ng
spring.data.elasticsearch.repositories.enabled=true
# OpenAPI / Swagger configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
# Fix tri?t ?? l?i qu�t Sort/Pageable c?a Swagger
springdoc.model-converters.sort-converter.enabled=false

