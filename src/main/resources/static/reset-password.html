<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt lại mật khẩu - Badminton Shop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #e74c3c;
            --primary-light: #ff6b6b;
            --dark: #2c3e50;
            --light: #f8f9fa;
            --white: #ffffff;
            --gray: #95a5a6;
            --success: #2ecc71;
            --shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--dark);
        }

        .container {
            background-color: var(--white);
            padding: 40px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 450px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .logo {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 30px;
            color: var(--dark);
            letter-spacing: -1px;
        }

        .logo span {
            color: var(--primary);
        }

        h2 {
            font-size: 24px;
            margin-bottom: 10px;
            color: var(--dark);
        }

        p.subtitle {
            color: var(--gray);
            margin-bottom: 30px;
            font-size: 15px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
            color: var(--dark);
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #edf2f7;
            border-radius: 12px;
            font-family: inherit;
            font-size: 16px;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus {
            border-color: var(--primary-light);
            box-shadow: 0 0 0 4px rgba(231, 76, 60, 0.1);
        }

        button {
            width: 100%;
            padding: 16px;
            background-color: var(--primary);
            color: var(--white);
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(231, 76, 60, 0.3);
        }

        button:hover {
            background-color: var(--primary-light);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(231, 76, 60, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        #message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }

        .success {
            display: block !important;
            background-color: rgba(46, 204, 113, 0.1);
            color: var(--success);
            border: 1px solid var(--success);
        }

        .error {
            display: block !important;
            background-color: rgba(231, 76, 60, 0.1);
            color: var(--primary);
            border: 1px solid var(--primary);
        }

        /* Loading Spinner */
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading .button-text { display: none; }
        .loading .spinner { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">Badminton<span>Shop</span></div>
        <h2>Đặt lại mật khẩu</h2>
        <p class="subtitle">Vui lòng nhập mật khẩu mới cho tài khoản của bạn.</p>
        
        <form id="resetForm">
            <div class="form-group">
                <label for="password">Mật khẩu mới</label>
                <input type="password" id="password" placeholder="Nhập ít nhất 6 ký tự" required minlength="6">
            </div>
            <div class="form-group">
                <label for="confirmPassword">Xác nhận mật khẩu</label>
                <input type="password" id="confirmPassword" placeholder="Nhập lại mật khẩu mới" required minlength="6">
            </div>
            <button type="submit" id="submitBtn">
                <span class="button-text">Xác nhận đổi mật khẩu</span>
                <div class="spinner"></div>
            </button>
        </form>
        
        <div id="message"></div>
    </div>

    <script>
        const resetForm = document.getElementById('resetForm');
        const submitBtn = document.getElementById('submitBtn');
        const messageDiv = document.getElementById('message');
        
        // Extract token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            showMessage('Lỗi: Không tìm thấy mã xác thực. Vui lòng kiểm tra lại email.', 'error');
            submitBtn.disabled = true;
            submitBtn.style.opacity = '0.5';
        }

        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                showMessage('Mật khẩu xác nhận không khớp.', 'error');
                return;
            }

            // Show loading state
            submitBtn.classList.add('loading');
            submitBtn.disabled = true;
            messageDiv.className = '';
            messageDiv.style.display = 'none';

            try {
                const response = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        token: token,
                        newPassword: password
                    })
                });

                const result = await response.text();

                if (response.ok) {
                    showMessage('Thành công! Mật khẩu của bạn đã được thay đổi. Bạn hiện có thể đóng trang này và quay lại ứng dụng.', 'success');
                    resetForm.style.display = 'none';
                } else {
                    showMessage('Lỗi: ' + result, 'error');
                }
            } catch (err) {
                showMessage('Đã xảy ra lỗi kết nối. Vui lòng thử lại sau.', 'error');
            } finally {
                submitBtn.classList.remove('loading');
                submitBtn.disabled = false;
            }
        });

        function showMessage(msg, type) {
            messageDiv.innerText = msg;
            messageDiv.className = type;
            messageDiv.style.display = 'block';
        }
    </script>
</body>
</html>
